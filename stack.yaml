# Skills & Specs Lab - Gridctl stack
#
# Brings up the MCP gateway that your client connects to. Two things live here:
#   1. The Containerlab MCP server, filtered to READ-ONLY tools. The `tools:`
#      allow-list is the lesson: least privilege expressed in config, not prose.
#      Students get live topology awareness with zero deploy/destroy exposure.
#   2. A pointer to the skills registry. Skills are NOT declared in this file;
#      they live in ~/.gridctl/registry/skills/ (load them with
#      ./scripts/load-skills.sh) and Gridctl serves active ones as MCP prompts.
#
# Apply:    gridctl apply stack.yaml
# Status:   gridctl status
# Connect:  gridctl link claude-code      (or: gridctl link --all)
# Destroy:  gridctl destroy stack.yaml
#
# Validate without deploying:  gridctl validate stack.yaml

version: "1"
name: skills-specs-lab

network:
  name: skills-specs-lab-net
  driver: bridge

mcp-servers:

  # --- Containerlab MCP server (read-only) -----------------------------------
  # FloSch62/clab-mcp-server: a stdio Go binary that talks to a Containerlab API
  # server (hellt/clab-api). Build it once and put it on PATH, or set
  # CLAB_MCP_BIN to its absolute path. See setup/04-gridctl.md.
  #
  # tools: is the read-only allow-list. The server also exposes deployLab,
  # destroyLab, and execCommand; by omitting them here they never reach the
  # gateway or the model. That is the demonstrable least-privilege control.
  - name: clab
    command: ["${CLAB_MCP_BIN:-clab-mcp-server}"]
    transport: stdio
    tools: ["authenticate", "listLabs", "inspectLab"]
    env:
      API_SERVER_URL: "${CLAB_API_URL:-http://localhost:8080}"
      API_USERNAME: "${CLAB_API_USER:-admin}"
      API_PASSWORD: "${CLAB_API_PASS:-password}"

  # --- GitHub MCP server (post-workshop only) --------------------------------
  # Enabled as part of the contribution flow, NOT in pre-work. The contributing
  # skill walks you through creating a fine-grained PAT and storing it in the
  # Gridctl vault (gridctl var set GITHUB_PERSONAL_ACCESS_TOKEN). Uncomment when
  # you reach CONTRIBUTING.md.
  #
  # - name: github
  #   image: ghcr.io/github/github-mcp-server:latest
  #   transport: stdio
  #   tools: ["get_file_contents", "create_branch", "create_pull_request", "search_code"]
  #   env:
  #     GITHUB_PERSONAL_ACCESS_TOKEN: "${var:GITHUB_PERSONAL_ACCESS_TOKEN}"
